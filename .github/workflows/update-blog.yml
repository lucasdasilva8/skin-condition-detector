name: Update skin care blog

on:
  schedule:
    # 1st and 15th of each month at 14:00 UTC (~every two weeks)
    - cron: "0 14 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest articles from medical RSS feeds
        run: python scripts/update_blog.py

      - name: Commit updated posts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/blog/posts.json
          git diff --staged --quiet || git commit -m "chore: refresh skin care blog posts"
          git push
